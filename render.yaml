databases:
  - name: scfc-postgres
    plan: free
    databaseName: surat_food_chain
    user: surat

services:
  # ── API (Express + Prisma + Socket.IO + pg-boss, all in one process) ──────
  - type: web
    name: scfc-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >
      npm install --include=dev &&
      npx prisma generate --schema=apps/api/prisma/schema.prisma &&
      npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma &&
      npm run api:build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: scfc-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: HOME_STATE_CODE
        value: "24"
      # Set this to the web service's live URL after both services are up
      # (Render UI → scfc-api → Environment). Needed for CORS.
      - key: WEB_ORIGIN
        sync: false
      # Fill these in the Render dashboard, not in git.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GSTZEN_API_KEY
        sync: false

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  - type: web
    name: scfc-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run web:build
    startCommand: npm run start --workspace @scfc/web
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to the API service's live URL (Render UI → scfc-web →
      # Environment), then trigger a manual redeploy — Next.js inlines
      # NEXT_PUBLIC_* vars at build time, so this must be set before building.
      - key: NEXT_PUBLIC_API_URL
        sync: false
